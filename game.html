<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>המסע הגדול – משחקי מדינות לכיתת תקשורת</title>
<style>
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;}
  html,body{margin:0;height:100%;font-family:"Varela Round","Assistant","Segoe UI",Arial,sans-serif;color:#2a3d55;}
  body{height:100vh;overflow:hidden;background:#f5f8fc;display:flex;flex-direction:column;}

  #bar{display:flex;align-items:center;gap:10px;padding:8px 14px;background:#fff;box-shadow:0 2px 10px rgba(0,0,0,.06);flex:0 0 auto;z-index:50;}
  .iconbtn{font-size:24px;border:none;border-radius:14px;cursor:pointer;padding:8px 12px;font-family:inherit;}
  #home{background:#ffe0e0;} #sound{background:#e8eefc;}
  .bar-title{font-weight:800;font-size:20px;flex:1;text-align:center;}
  #stars{font-weight:900;font-size:20px;background:#fff7d6;border-radius:14px;padding:6px 12px;white-space:nowrap;}
  #stars.bump{animation:starbump .4s;}
  @keyframes starbump{0%,100%{transform:scale(1)}40%{transform:scale(1.35)}}
  .floatstar{position:fixed;font-size:30px;pointer-events:none;z-index:60;}
  #mega{position:fixed;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:10px;
        background:rgba(20,40,80,.55);z-index:70;text-align:center;}
  #mega.show{display:flex;animation:cpop .5s;}
  #mega .crown{font-size:clamp(90px,24vw,180px);}
  #mega .txt{font-size:clamp(28px,6vw,52px);font-weight:900;color:#fff;text-shadow:0 4px 0 rgba(0,0,0,.25);}

  .view{flex:1;position:relative;overflow:hidden;display:none;flex-direction:column;}
  .view.active{display:flex;}

  /* תפריט */
  #home-view{align-items:center;justify-content:center;gap:14px;background:linear-gradient(160deg,#eaf3ff,#ffffff);overflow:auto;}
  #home-view h1{font-size:clamp(30px,6vw,52px);margin:6px;}
  .group-label{font-size:clamp(16px,3vw,22px);font-weight:800;color:#5a6b82;margin-top:8px;}
  .menu{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;max-width:820px;padding:6px 12px;}
  .gamecard{background:#fff;border:none;border-radius:24px;box-shadow:0 8px 22px rgba(0,0,0,.1);cursor:pointer;
            width:clamp(130px,30vw,180px);padding:20px 12px;display:flex;flex-direction:column;align-items:center;gap:8px;transition:transform .12s;}
  .gamecard:active{transform:scale(.95);}
  .gamecard .emo{font-size:clamp(46px,10vw,72px);}
  .gamecard .lbl{font-size:clamp(17px,3.4vw,23px);font-weight:800;}
  .gamecard.mini{width:clamp(110px,24vw,150px);padding:14px 10px;opacity:.92;}
  .gamecard.mini .emo{font-size:clamp(36px,8vw,54px);}

  .big{font-family:inherit;font-weight:900;color:#fff;border:none;border-radius:22px;cursor:pointer;
       font-size:clamp(20px,4vw,30px);padding:14px 26px;box-shadow:0 8px 0 rgba(0,0,0,.15);transition:transform .1s;}
  .big:active{transform:translateY(5px);box-shadow:0 3px 0 rgba(0,0,0,.15);}

  /* ===== בועות ===== */
  #bub-view{background:linear-gradient(180deg,#bfe3ff,#eaf7ff);}
  .bubble{position:absolute;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;
          background:radial-gradient(circle at 32% 28%,rgba(255,255,255,.95),rgba(180,220,255,.55) 60%,rgba(120,180,240,.35));
          box-shadow:inset 0 0 18px rgba(255,255,255,.7),0 6px 14px rgba(0,0,0,.12);overflow:hidden;}
  .bubble img{width:62%;border-radius:6px;} .bubble span{font-size:46px;}
  .bubble.pop{animation:pop .35s forwards;}
  @keyframes pop{to{transform:scale(1.5);opacity:0;}}

  /* ===== הפתעה ===== */
  #sur-view{align-items:center;justify-content:center;background:linear-gradient(160deg,#fff3d6,#ffffff);}
  #giftbox{font-size:clamp(120px,30vw,240px);cursor:pointer;transition:transform .1s;}
  #giftbox.shake{animation:gshake .4s ease-in-out infinite;}
  @keyframes gshake{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
  #surprise{font-size:clamp(120px,30vw,240px);}
  #surprise.jump{animation:jump 1s;}
  @keyframes jump{0%{transform:scale(.2) translateY(80px);opacity:0}40%{transform:scale(1.3) translateY(-30px);opacity:1}70%{transform:scale(1) translateY(0)}100%{transform:scale(1)}}
  .sur-hint{font-size:clamp(20px,4vw,30px);font-weight:800;color:#7a6320;}

  /* ===== המראה ===== */
  #fly-view{align-items:center;justify-content:center;}
  #sky{position:absolute;inset:0;transition:background .6s;background:linear-gradient(180deg,#bfe3ff,#eafff0);}
  #bigplane{font-size:clamp(120px,28vw,220px);cursor:pointer;z-index:3;}
  #bigplane.takeoff{animation:takeoff 1.8s ease-in forwards;}
  @keyframes takeoff{0%{transform:translate(0,0) rotate(0)}100%{transform:translate(-60vw,-90vh) rotate(-25deg);opacity:.2}}
  #flyflag{position:absolute;top:14px;left:18px;width:90px;border-radius:8px;box-shadow:0 6px 16px rgba(0,0,0,.2);display:none;animation:wave 2.2s ease-in-out infinite;z-index:4;}
  @keyframes wave{0%,100%{transform:rotate(-3deg)}50%{transform:rotate(3deg)}}
  #flyname{position:absolute;top:90px;left:0;right:0;text-align:center;font-size:clamp(28px,6vw,48px);font-weight:900;color:#fff;text-shadow:0 3px 0 rgba(0,0,0,.18);z-index:4;}
  .fly-hint{position:absolute;bottom:18px;left:0;right:0;text-align:center;font-size:clamp(18px,3.5vw,26px);font-weight:800;color:#3a5a80;z-index:4;}

  /* ===== חקר ===== */
  #flagwave{position:absolute;top:12px;left:16px;width:80px;border-radius:8px;box-shadow:0 6px 16px rgba(0,0,0,.18);animation:wave 2.2s ease-in-out infinite;z-index:3;}
  .cname{text-align:center;font-size:clamp(26px,5.5vw,46px);font-weight:900;margin:10px;z-index:3;}
  #ex-items{flex:1;display:flex;flex-wrap:wrap;align-content:center;justify-content:center;gap:18px;padding:8px;}
  .item{font-size:clamp(56px,12vw,110px);background:#fff;border:none;border-radius:26px;width:clamp(110px,22vw,170px);height:clamp(110px,22vw,170px);
        display:flex;align-items:center;justify-content:center;box-shadow:0 8px 20px rgba(0,0,0,.12);cursor:pointer;transition:transform .1s;}
  .item:active{transform:scale(.9);}
  .item.boing{animation:boing .6s;}
  @keyframes boing{0%{transform:scale(1)}30%{transform:scale(1.35) rotate(-8deg)}60%{transform:scale(.9) rotate(6deg)}100%{transform:scale(1)}}
  .item.dance{animation:dance .5s ease-in-out infinite;}
  @keyframes dance{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-16px) rotate(6deg)}}
  .controls{display:flex;justify-content:center;gap:16px;padding:10px 10px 16px;}
  #music{background:#9b5de5;} #flyon{background:#f59e0b;}
  #expass{display:flex;gap:5px;justify-content:center;padding:6px;flex-wrap:wrap;}
  .stamp{width:34px;height:34px;border-radius:8px;background:#eef2f8;display:flex;align-items:center;justify-content:center;border:2px dashed #cdd8e6;font-size:15px;}
  .stamp.done{background:#fff;border:2px solid #2ec27e;} .stamp img{width:25px;border-radius:3px;}

  /* ===== התאמה ===== */
  #match-view{align-items:center;justify-content:center;gap:14px;}
  .prompt{display:flex;flex-direction:column;align-items:center;gap:4px;}
  .prompt .emo{font-size:clamp(70px,15vw,130px);} .prompt .cap{font-size:clamp(24px,5vw,40px);font-weight:900;}
  .ask{font-size:clamp(18px,3.5vw,26px);font-weight:700;color:#5a6b82;}
  #match-opts{display:flex;flex-wrap:wrap;gap:18px;justify-content:center;max-width:760px;}
  .flagbtn{background:#fff;border:5px solid #fff;border-radius:20px;padding:12px;cursor:pointer;box-shadow:0 8px 20px rgba(0,0,0,.12);width:clamp(120px,26vw,180px);transition:transform .12s,border-color .2s;}
  .flagbtn img{width:100%;border-radius:10px;display:block;} .flagbtn:active{transform:scale(.94);}
  .flagbtn.ok{border-color:#2ec27e;animation:boing .5s;}
  .flagbtn.no{animation:shake .4s;}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-10px)}75%{transform:translateX(10px)}}

  /* ===== זיכרון ===== */
  #mem-view{align-items:center;justify-content:center;}
  #mem-board{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;max-width:520px;padding:10px;width:100%;}
  .card{aspect-ratio:1/1;border-radius:18px;cursor:pointer;position:relative;}
  .cface{position:absolute;inset:0;border-radius:18px;display:flex;align-items:center;justify-content:center;backface-visibility:hidden;box-shadow:0 6px 16px rgba(0,0,0,.12);transition:transform .4s;}
  .cback{background:#3a86ff;color:#fff;font-size:clamp(30px,8vw,56px);}
  .cfront{background:#fff;transform:rotateY(180deg);overflow:hidden;} .cfront img{width:80%;border-radius:8px;}
  .card.flip .cback{transform:rotateY(180deg);} .card.flip .cfront{transform:rotateY(0);}
  .card.matched{animation:boing .5s;}

  /* כללי */
  #plane{position:absolute;top:38%;right:-160px;font-size:84px;z-index:20;pointer-events:none;}
  #plane.go{animation:flyacross 1.5s ease-in-out forwards;}
  @keyframes flyacross{0%{right:-160px}100%{right:110%}}
  #count{position:absolute;inset:0;display:none;align-items:center;justify-content:center;font-size:clamp(120px,40vw,300px);font-weight:900;color:#ff7b00;z-index:40;text-shadow:0 6px 0 rgba(0,0,0,.15);}
  #count.show{display:flex;animation:cpop .6s;}
  @keyframes cpop{0%{transform:scale(.4);opacity:0}40%{transform:scale(1.2);opacity:1}100%{transform:scale(1);opacity:1}}
  .spark{position:absolute;font-size:32px;pointer-events:none;z-index:35;}
  .confetti{position:absolute;width:14px;height:14px;border-radius:3px;pointer-events:none;z-index:35;}
  .endscreen{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:20px;background:linear-gradient(160deg,#cfe6ff,#ffffff);z-index:30;text-align:center;padding:20px;}
  .endscreen.show{display:flex;} .endscreen h2{font-size:clamp(34px,7vw,60px);margin:0;} .endscreen p{font-size:clamp(20px,4vw,30px);font-weight:800;margin:0;color:#41597a;}
  .shakeit{animation:scr .4s;}
  @keyframes scr{0%,100%{transform:translate(0,0)}20%{transform:translate(-8px,4px)}40%{transform:translate(8px,-4px)}60%{transform:translate(-6px,2px)}80%{transform:translate(6px,-2px)}}
</style>
</head>
<body>
<a href="./" title="בית" style="position:fixed;top:10px;left:10px;z-index:99999;background:rgba(255,255,255,.92);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:22px;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.28)">🏠</a>

  <div id="bar">
    <button id="home" class="iconbtn" title="בית">🏠</button>
    <div class="bar-title" id="barTitle">המסע הגדול</div>
    <div id="stars" title="כוכבים שאספת">⭐ <span id="starnum">0</span></div>
    <button id="sound" class="iconbtn" title="קול">🔊</button>
  </div>

  <!-- תפריט -->
  <div id="home-view" class="view active">
    <h1>✈️ המסע הגדול 🌍</h1>
    <div class="group-label">🔥 הכי מדליק</div>
    <div class="menu">
      <button class="gamecard" onclick="openBub()"><span class="emo">🫧</span><span class="lbl">בועות</span></button>
      <button class="gamecard" onclick="openSur()"><span class="emo">🎁</span><span class="lbl">הפתעה</span></button>
      <button class="gamecard" onclick="openFly()"><span class="emo">🚀</span><span class="lbl">המראה</span></button>
      <button class="gamecard" onclick="openExplore()"><span class="emo">🧭</span><span class="lbl">חוקרים</span></button>
    </div>
    <div class="group-label">🎓 למתקדמים</div>
    <div class="menu">
      <button class="gamecard mini" onclick="openMatch()"><span class="emo">🚩</span><span class="lbl">טסים לדגל</span></button>
      <button class="gamecard mini" onclick="openMemory()"><span class="emo">🃏</span><span class="lbl">זיכרון</span></button>
    </div>
  </div>

  <!-- בועות -->
  <div id="bub-view" class="view"></div>

  <!-- הפתעה -->
  <div id="sur-view" class="view">
    <div class="sur-hint" id="sur-hint">נגעו במתנה! 🎁</div>
    <div id="giftbox" onclick="popSurprise()">🎁</div>
    <div id="surprise"></div>
  </div>

  <!-- המראה -->
  <div id="fly-view" class="view">
    <div id="sky"></div>
    <img id="flyflag" alt=""><div id="flyname"></div>
    <div id="bigplane" onclick="doTakeoff()">🛫</div>
    <div class="fly-hint" id="fly-hint">נגעו במטוס כדי להמריא! ✈️</div>
  </div>

  <!-- חקר -->
  <div id="explore-view" class="view">
    <img id="flagwave" alt=""><div class="cname" id="ex-name"></div>
    <div id="ex-items"></div>
    <div id="expass"></div>
    <div class="controls">
      <button id="music" class="big">🎵 מוזיקה</button>
      <button id="flyon" class="big">✈️ הלאה</button>
    </div>
    <div id="plane">✈️</div>
    <div class="endscreen" id="ex-end"><div style="font-size:84px">🏆</div><h2>חקרנו את העולם!</h2><button class="big" style="background:#3a86ff" onclick="openExplore()">🔁 שוב</button></div>
  </div>

  <!-- התאמה -->
  <div id="match-view" class="view">
    <div class="prompt"><span class="emo" id="m-emo">🗼</span><span class="cap" id="m-cap"></span></div>
    <div class="ask">איפה הדגל?</div><div id="match-opts"></div>
    <div class="endscreen" id="m-end"><div style="font-size:84px">🌟</div><h2>כל הכבוד!</h2><button class="big" style="background:#3a86ff" onclick="openMatch()">🔁 שוב</button></div>
  </div>

  <!-- זיכרון -->
  <div id="mem-view" class="view">
    <div id="mem-board"></div>
    <div class="endscreen" id="mem-end"><div style="font-size:84px">🎉</div><h2>מצאת את כל הזוגות!</h2><button class="big" style="background:#3a86ff" onclick="openMemory()">🔁 שוב</button></div>
  </div>

  <div id="count"></div>
  <div id="mega"><div class="crown">👑</div><div class="txt" id="mega-txt"></div></div>

<!-- מניפסט קולות AI (נוצר ע"י generate-voices.ps1). אם חסר – נופלים לקול חלופי -->
<script src="voice/voices.js" onerror="void 0"></script>
<script>
const COUNTRIES=[
  {name:"צרפת",flag:"fr",emo:"🗼",items:[["🗼","מגדל אייפל"],["🥐","קרואסון"],["🎨","ציור"],["🧀","גבינה"]],tune:[523,659,784,659]},
  {name:"איטליה",flag:"it",emo:"🍕",items:[["🍕","פיצה"],["🍝","פסטה"],["🎭","מסכה"],["🚤","סירה"]],tune:[587,659,784,880]},
  {name:"יפן",flag:"jp",emo:"🌸",items:[["🌸","פרח"],["🍣","סושי"],["🐱","חתול"],["🎋","עץ"]],tune:[659,784,880,784]},
  {name:"מצרים",flag:"eg",emo:"🐫",items:[["🐫","גמל"],["🌅","שמש"],["🐊","תנין"],["⭐","כוכב"]],tune:[440,523,587,659]},
  {name:"ברזיל",flag:"br",emo:"⚽",items:[["⚽","כדורגל"],["🦜","תוכי"],["🥁","תוף"],["🌴","דקל"]],tune:[523,587,659,784]},
  {name:"סין",flag:"cn",emo:"🐼",items:[["🐼","פנדה"],["🐉","דרקון"],["🏮","פנס"],["🥟","כיסון"]],tune:[659,587,523,440]},
  {name:"אמריקה",flag:"us",emo:"🗽",items:[["🗽","פסל"],["🍔","המבורגר"],["🏀","כדורסל"],["🦅","נשר"]],tune:[523,659,784,1047]},
  {name:"אוסטרליה",flag:"au",emo:"🦘",items:[["🦘","קנגורו"],["🐨","קואלה"],["🏄","גלשן"],["🐊","תנין"]],tune:[784,659,587,523]},
  {name:"הודו",flag:"in",emo:"🐘",items:[["🐘","פיל"],["🐅","נמר"],["🦚","טווס"],["🍛","אורז"]],tune:[587,659,587,784]},
  {name:"ישראל",flag:"il",emo:"🍊",items:[["🐪","גמל"],["🌻","חמנייה"],["🍊","תפוז"],["🕊️","יונה"]],tune:[659,784,880,1047]},
];
const flagURL=c=>`https://flagcdn.com/w320/${c}.png`;
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
const rnd=a=>a[(Math.random()*a.length)|0];
const ALL_FUN=[].concat(...COUNTRIES.map(c=>c.items)); // [emoji,label] לכל החפצים/חיות

/* ===== קול ===== */
let soundOn=true,audioCtx=null;
const actx=()=>audioCtx||(audioCtx=new(window.AudioContext||window.webkitAudioContext)());
function tone(f,dur=.18,type="sine",when=0,vol=.25){if(!soundOn)return;try{const c=actx(),o=c.createOscillator(),g=c.createGain(),t=c.currentTime+when;o.type=type;o.frequency.value=f;o.connect(g);g.connect(c.destination);g.gain.setValueAtTime(.0001,t);g.gain.exponentialRampToValueAtTime(vol,t+.02);g.gain.exponentialRampToValueAtTime(.0001,t+dur);o.start(t);o.stop(t+dur);}catch(e){}}
const PENTA=[523,587,659,784,880,1047];
const sparkleSound=()=>{const f=rnd(PENTA);tone(f,.2,"triangle");tone(f*1.5,.18,"sine",.04,.12);};
const popSound=()=>{tone(900,.08,"sine",0,.3);tone(500,.12,"sine",.05,.2);};
const winSound=()=>[523,659,784,1047].forEach((f,i)=>tone(f,.2,"triangle",i*.1,.22));
const softSound=()=>{tone(300,.18,"sine",0,.18);tone(240,.2,"sine",.12,.16);};
const playTune=n=>n.forEach((f,i)=>tone(f,.22,"triangle",i*.22,.22));
const boom=()=>{tone(120,.4,"sawtooth",0,.3);for(let i=0;i<6;i++)tone(400+Math.random()*900,.25,"sine",.05+i*.04,.15);};
function rumble(){if(!soundOn)return;try{const c=actx();for(let i=0;i<18;i++)tone(80+i*40,.12,"sawtooth",i*.08,.18);}catch(e){}}

let ttsAudio=new Audio();
function speak(txt){if(!soundOn)return;try{speechSynthesis&&speechSynthesis.cancel();}catch(e){}
  // 1) קול AI מקומי (Gemini) אם קיים  2) קול Google חי  3) קול מערכת
  const local=(window.VOICE&&window.VOICE[txt])?("voice/"+window.VOICE[txt]):null;
  try{ttsAudio.pause();
    if(local){ttsAudio=new Audio(local);ttsAudio.onerror=()=>googleTTS(txt);}
    else{return googleTTS(txt);}
    const p=ttsAudio.play();if(p&&p.catch)p.catch(()=>googleTTS(txt));
  }catch(e){googleTTS(txt);}}
function googleTTS(txt){try{ttsAudio=new Audio("https://translate.google.com/translate_tts?ie=UTF-8&client=tw-ob&tl=he&q="+encodeURIComponent(txt));ttsAudio.onerror=()=>synthSpeak(txt);const p=ttsAudio.play();if(p&&p.catch)p.catch(()=>synthSpeak(txt));}catch(e){synthSpeak(txt);}}
function synthSpeak(txt){if(!soundOn||!window.speechSynthesis)return;speechSynthesis.cancel();const u=new SpeechSynthesisUtterance(txt);u.lang="he-IL";u.rate=.85;u.pitch=1.7;const v=speechSynthesis.getVoices().filter(x=>/he|iw/i.test(x.lang));u.voice=v.find(x=>/female|woman|carmit|כרמית/i.test(x.name))||v[0];speechSynthesis.speak(u);}
document.getElementById("sound").onclick=function(){soundOn=!soundOn;this.textContent=soundOn?"🔊":"🔇";if(!soundOn){try{ttsAudio.pause();speechSynthesis.cancel();}catch(e){}}};

/* ===== אפקטים ===== */
function sparklesAt(x,y){const s=["✨","⭐","🌟","💫"];for(let i=0;i<5;i++){const e=document.createElement("div");e.className="spark";e.textContent=s[i%s.length];e.style.left=x+"px";e.style.top=y+"px";document.body.appendChild(e);const dx=(Math.random()-.5)*160,dy=-60-Math.random()*120;e.animate([{transform:"translate(0,0) scale(1)",opacity:1},{transform:`translate(${dx}px,${dy}px) scale(.3)`,opacity:0}],{duration:800,easing:"ease-out"});setTimeout(()=>e.remove(),820);}}
function fireworks(){const cols=["#3a86ff","#2ec27e","#ffd86b","#ff6b6b","#9b5de5","#ff7b00"];for(let i=0;i<36;i++){const c=document.createElement("div");c.className="confetti";c.style.background=cols[i%cols.length];c.style.left=(20+Math.random()*60)+"%";c.style.top="55%";document.body.appendChild(c);const dx=(Math.random()-.5)*500,dy=-(150+Math.random()*350);c.animate([{transform:"translate(0,0)",opacity:1},{transform:`translate(${dx}px,${dy}px) rotate(${Math.random()*720}deg)`,opacity:0}],{duration:1100+Math.random()*500,easing:"ease-out"});setTimeout(()=>c.remove(),1700);}boom();}
function countdown(cb){const el=document.getElementById("count");let n=3;
  const step=()=>{if(n===0){el.classList.remove("show");el.textContent="";cb();return;}
    el.textContent=n;el.classList.remove("show");void el.offsetWidth;el.classList.add("show");tone(600,.2,"square",0,.25);speak(""+n);n--;setTimeout(step,800);};step();}

/* ===== מנוע תגמול ("שלא ירצו לעזוב") ===== */
let stars=parseInt(localStorage.getItem("mt_stars")||"0",10);
function renderStars(){document.getElementById("starnum").textContent=stars;}
renderStars();
const JACKPOT=["👑 ג'קפוט!","🎉 וואו!","🚀 ענק!","🌈 מדהים!"];
function reward(x,y){
  stars++;localStorage.setItem("mt_stars",stars);renderStars();
  const sb=document.getElementById("stars");sb.classList.remove("bump");void sb.offsetWidth;sb.classList.add("bump");
  if(x!=null){const f=document.createElement("div");f.className="floatstar";f.textContent="⭐";f.style.left=x+"px";f.style.top=y+"px";document.body.appendChild(f);
    f.animate([{transform:"transl(0,0) scale(1)",opacity:1},{transform:"translateY(-90px) scale(.4)",opacity:0}],{duration:700,easing:"ease-out"});setTimeout(()=>f.remove(),720);}
  if(stars%10===0){milestone();}                 // אבן דרך כל 10
  else if(Math.random()<0.12){jackpot();}        // תגמול משתנה מפתיע
}
function milestone(){const m=document.getElementById("mega");document.getElementById("mega-txt").textContent="אספת "+stars+" כוכבים! 🎉";m.classList.add("show");fireworks();setTimeout(fireworks,400);setTimeout(fireworks,800);[523,659,784,1047,1319].forEach((f,i)=>tone(f,.25,"triangle",i*.12,.25));speak("כל הכבוד! אספת עוד כוכבים");setTimeout(()=>m.classList.remove("show"),2600);}
function jackpot(){const m=document.getElementById("mega");document.getElementById("mega-txt").textContent=rnd(JACKPOT);m.classList.add("show");fireworks();setTimeout(fireworks,350);winSound();setTimeout(()=>m.classList.remove("show"),1500);}

/* כל נגיעה במסך מגיבה – אף רגע מת */
document.addEventListener("pointerdown",e=>{
  if(e.target.closest("button,.bubble,.item,.flagbtn,.card,#giftbox,#bigplane,.gamecard"))return; // לכפתורים יש כבר תגובה
  if(document.getElementById("home-view").classList.contains("active"))return;
  sparklesAt(e.clientX,e.clientY);tone(rnd(PENTA),.12,"sine",0,.12);
},{passive:true});

/* ===== ניווט ===== */
let bubTimer=null;
function show(id){document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));document.getElementById(id).classList.add("active");}
document.getElementById("home").onclick=()=>{stopAll();document.getElementById("barTitle").textContent="המסע הגדול";show("home-view");};
function stopAll(){try{ttsAudio.pause();speechSynthesis.cancel();}catch(e){}if(bubTimer){clearInterval(bubTimer);bubTimer=null;}document.querySelectorAll(".endscreen").forEach(e=>e.classList.remove("show"));}
function title(t){document.getElementById("barTitle").textContent=t;}

/* ========== בועות ========== */
function openBub(){try{actx().resume();}catch(e){}stopAll();title("בועות 🫧");show("bub-view");
  const v=document.getElementById("bub-view");v.innerHTML="";
  spawnBubble();spawnBubble();
  bubTimer=setInterval(()=>{if(document.querySelectorAll("#bub-view .bubble").length<6)spawnBubble();},1100);}
function spawnBubble(){const v=document.getElementById("bub-view");const useFlag=Math.random()<.5;
  const b=document.createElement("div");b.className="bubble";
  const size=90+Math.random()*70;b.style.width=b.style.height=size+"px";
  b.style.left=(8+Math.random()*78)+"%";b.style.bottom="-160px";
  let label="";
  if(useFlag){const c=rnd(COUNTRIES);b.innerHTML=`<img src="${flagURL(c.flag)}">`;label=c.name;}
  else{const it=rnd(ALL_FUN);b.innerHTML=`<span>${it[0]}</span>`;label=it[1];}
  v.appendChild(b);
  const dur=6000+Math.random()*4000;
  const anim=b.animate([{transform:"translateY(0) translateX(0)"},{transform:`translateY(-${window.innerHeight+250}px) translateX(${(Math.random()-.5)*120}px)`}],{duration:dur,easing:"linear"});
  anim.onfinish=()=>b.remove();
  b.onclick=()=>{if(b.classList.contains("pop"))return;b.classList.add("pop");popSound();sparkleSound();const r=b.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;sparklesAt(cx,cy);reward(cx,cy);speak(label);setTimeout(()=>b.remove(),350);};}

/* ========== הפתעה ========== */
let surBusy=false;
function openSur(){try{actx().resume();}catch(e){}stopAll();title("הפתעה 🎁");show("sur-view");
  surBusy=false;document.getElementById("surprise").textContent="";document.getElementById("giftbox").style.display="block";
  document.getElementById("sur-hint").textContent="נגעו במתנה! 🎁";}
function popSurprise(){if(surBusy)return;surBusy=true;
  const box=document.getElementById("giftbox");box.classList.add("shake");document.getElementById("sur-hint").textContent="";
  setTimeout(()=>{box.classList.remove("shake");},900);
  countdown(()=>{box.style.display="none";const it=rnd(ALL_FUN);const s=document.getElementById("surprise");
    s.textContent=it[0];s.classList.remove("jump");void s.offsetWidth;s.classList.add("jump");
    fireworks();winSound();speak(it[1]);reward(window.innerWidth/2,window.innerHeight/2);
    setTimeout(()=>{document.getElementById("sur-hint").textContent="עוד? נגעו שוב! 🎁";box.style.display="block";s.textContent="";surBusy=false;},1800);});}

/* ========== המראה ========== */
let flyIdx=-1,flyBusy=false;
function openFly(){try{actx().resume();}catch(e){}stopAll();title("המראה 🚀");show("fly-view");flyIdx=-1;flyBusy=false;
  document.getElementById("flyflag").style.display="none";document.getElementById("flyname").textContent="";
  document.getElementById("bigplane").style.display="block";document.getElementById("bigplane").classList.remove("takeoff");
  document.getElementById("fly-hint").textContent="נגעו במטוס כדי להמריא! ✈️";
  document.getElementById("sky").style.background="linear-gradient(180deg,#bfe3ff,#eafff0)";}
function doTakeoff(){if(flyBusy)return;flyBusy=true;document.getElementById("fly-hint").textContent="";
  document.getElementById("flyflag").style.display="none";document.getElementById("flyname").textContent="";
  countdown(()=>{const plane=document.getElementById("bigplane");rumble();
    document.getElementById("fly-view").classList.add("shakeit");setTimeout(()=>document.getElementById("fly-view").classList.remove("shakeit"),500);
    plane.classList.add("takeoff");
    setTimeout(()=>{flyIdx=(flyIdx+1)%COUNTRIES.length;const c=COUNTRIES[flyIdx];
      document.getElementById("sky").style.background="linear-gradient(180deg,#cfe9ff,#fff7e6)";
      document.getElementById("flyflag").src=flagURL(c.flag);document.getElementById("flyflag").style.display="block";
      document.getElementById("flyname").textContent="הגענו ל"+c.name+"!";
      fireworks();winSound();speak("הגענו ל"+c.name);reward(window.innerWidth/2,window.innerHeight/2);
      plane.classList.remove("takeoff");plane.style.display="block";
      document.getElementById("fly-hint").textContent="נגעו שוב כדי להמשיך! ✈️";flyBusy=false;},1900);});}

/* ========== חקר ========== */
let exOrder=[],exIdx=0;
function openExplore(){try{actx().resume();}catch(e){}stopAll();title("חוקרים 🧭");
  exOrder=[...COUNTRIES.keys()];exIdx=0;document.getElementById("ex-end").classList.remove("show");
  const p=document.getElementById("expass");p.innerHTML="";exOrder.forEach((_,k)=>{const d=document.createElement("div");d.className="stamp";d.id="st"+k;d.textContent="❓";p.appendChild(d);});
  show("explore-view");exShow();}
function exShow(){const c=COUNTRIES[exOrder[exIdx]];document.getElementById("flagwave").src=flagURL(c.flag);document.getElementById("ex-name").textContent=c.name;
  const box=document.getElementById("ex-items");box.innerHTML="";
  c.items.forEach(([emo,label])=>{const b=document.createElement("button");b.className="item";b.textContent=emo;
    b.onclick=()=>{b.classList.remove("boing");void b.offsetWidth;b.classList.add("boing");sparkleSound();const r=b.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;sparklesAt(cx,cy);reward(cx,cy);speak(label);};box.appendChild(b);});
  const d=document.getElementById("st"+exIdx);if(d){d.classList.add("done");d.innerHTML=`<img src="${flagURL(c.flag)}">`;}
  exPlane();setTimeout(()=>speak("הגענו ל"+c.name),900);}
function exPlane(){const p=document.getElementById("plane");p.classList.remove("go");void p.offsetWidth;p.classList.add("go");}
document.getElementById("music").onclick=()=>{const c=COUNTRIES[exOrder[exIdx]];playTune(c.tune);document.querySelectorAll("#ex-items .item").forEach(it=>it.classList.add("dance"));fireworks();setTimeout(()=>document.querySelectorAll("#ex-items .item").forEach(it=>it.classList.remove("dance")),1800);};
document.getElementById("flyon").onclick=()=>{exPlane();setTimeout(()=>{exIdx++;if(exIdx>=exOrder.length){document.getElementById("ex-end").classList.add("show");fireworks();setTimeout(fireworks,500);speak("כל הכבוד! חקרנו את כל העולם");}else exShow();},700);};

/* ========== התאמה ========== */
let mOrder=[],mIdx=0;
function openMatch(){try{actx().resume();}catch(e){}stopAll();title("טסים לדגל 🚩");mOrder=shuffle([...COUNTRIES.keys()]);mIdx=0;document.getElementById("m-end").classList.remove("show");show("match-view");mShow();}
function numOpts(i){return i<3?2:(i<6?3:4);}
function mShow(){const c=COUNTRIES[mOrder[mIdx]];document.getElementById("m-emo").textContent=c.emo;document.getElementById("m-cap").textContent=c.name;
  const n=numOpts(mIdx);let pool=[...COUNTRIES.keys()].filter(i=>i!==mOrder[mIdx]);shuffle(pool);let opts=shuffle([mOrder[mIdx],...pool.slice(0,n-1)]);
  const box=document.getElementById("match-opts");box.innerHTML="";
  opts.forEach(ci=>{const cc=COUNTRIES[ci];const b=document.createElement("button");b.className="flagbtn";b.innerHTML=`<img src="${flagURL(cc.flag)}">`;
    b.onclick=()=>{if(ci===mOrder[mIdx]){b.classList.add("ok");winSound();const r=b.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;sparklesAt(cx,cy);reward(cx,cy);speak("כל הכבוד");document.querySelectorAll("#match-opts .flagbtn").forEach(x=>x.onclick=null);setTimeout(()=>{mIdx++;if(mIdx>=mOrder.length){document.getElementById("m-end").classList.add("show");fireworks();speak("מצאת את כל הדגלים");}else mShow();},1300);}else{b.classList.add("no");softSound();setTimeout(()=>b.classList.remove("no"),400);}};box.appendChild(b);});
  setTimeout(()=>speak("איפה הדגל של "+c.name+"?"),350);}

/* ========== זיכרון ========== */
let memFlip=[],memLock=false,memPairs=0,memFound=0;
function openMemory(){try{actx().resume();}catch(e){}stopAll();title("זיכרון 🃏");document.getElementById("mem-end").classList.remove("show");show("mem-view");
  const pick=shuffle([...COUNTRIES.keys()]).slice(0,3);memPairs=pick.length;memFound=0;memFlip=[];memLock=false;
  let deck=shuffle([...pick,...pick]);const board=document.getElementById("mem-board");board.innerHTML="";
  deck.forEach(ci=>{const cc=COUNTRIES[ci];const card=document.createElement("div");card.className="card";card.dataset.c=ci;card.innerHTML=`<div class="cface cback">❓</div><div class="cface cfront"><img src="${flagURL(cc.flag)}"></div>`;card.onclick=()=>memClick(card);board.appendChild(card);});}
function memClick(card){if(memLock||card.classList.contains("flip")||card.classList.contains("matched"))return;card.classList.add("flip");sparkleSound();memFlip.push(card);
  if(memFlip.length===2){memLock=true;const[a,b]=memFlip;
    if(a.dataset.c===b.dataset.c){setTimeout(()=>{a.classList.add("matched");b.classList.add("matched");winSound();const r=b.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;sparklesAt(cx,cy);reward(cx,cy);speak(COUNTRIES[a.dataset.c].name);memFlip=[];memLock=false;memFound++;if(memFound===memPairs){setTimeout(()=>{document.getElementById("mem-end").classList.add("show");fireworks();speak("מצאת את כל הזוגות! כל הכבוד");},600);}},700);}
    else{softSound();setTimeout(()=>{a.classList.remove("flip");b.classList.remove("flip");memFlip=[];memLock=false;},1000);}}}

if(window.speechSynthesis){speechSynthesis.onvoiceschanged=()=>{};}
</script>
