<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>אתגרי העולם – משחקי חקר</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root{--ink:#274060;--good:#3cb371;--gold:#f2b134;--bad:#e8746a;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;font-family:"Heebo",Arial,sans-serif;color:var(--ink);
    background:linear-gradient(160deg,#eaf4ff,#fff8ec);overflow:hidden;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;}
  header{padding:12px;text-align:center;background:linear-gradient(160deg,#bfe0ff,#8fc0f5);
    box-shadow:0 3px 12px rgba(0,0,0,.12);border-radius:0 0 20px 20px;position:relative;}
  h1{margin:0;font-size:clamp(20px,4vw,30px);font-weight:900;}
  .stars{position:absolute;top:12px;right:14px;font-weight:900;font-size:18px;color:#b56b00;}
  .mute{position:absolute;top:12px;left:14px;background:#fff;border:none;border-radius:18px;padding:5px 12px;font-family:inherit;font-weight:800;cursor:pointer;box-shadow:0 2px 0 #cdd8e6;}
  .back{position:absolute;top:12px;left:70px;background:#fff;border:none;border-radius:18px;padding:5px 14px;font-family:inherit;font-weight:800;cursor:pointer;box-shadow:0 2px 0 #cdd8e6;}
  .home{position:fixed;top:10px;left:10px;z-index:50;background:rgba(255,255,255,.92);border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;font-size:22px;text-decoration:none;box-shadow:0 2px 8px rgba(0,0,0,.28);}
  main{flex:1;display:flex;align-items:center;justify-content:center;padding:14px;overflow:auto;}
  .hidden{display:none!important;}
  .view{width:100%;max-width:840px;text-align:center;}
  .hint{font-size:clamp(18px,3vw,24px);font-weight:800;margin:4px 0 16px;min-height:30px;}

  .menu{display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:18px;max-width:760px;width:100%;}
  .gcard{background:#fff;border:4px solid #fff;border-radius:24px;padding:24px 16px;text-align:center;cursor:pointer;box-shadow:0 6px 18px rgba(0,0,0,.10);transition:transform .15s;}
  .gcard:active{transform:scale(.97);}
  .gcard .i{font-size:56px;} .gcard .l{font-size:clamp(20px,3.5vw,26px);font-weight:900;margin-top:8px;}
  .gcard .d{font-size:14px;color:#5a6b82;font-weight:700;margin-top:4px;}

  /* match */
  .bigflag{width:min(70vw,300px);border-radius:14px;box-shadow:0 8px 24px rgba(0,0,0,.28);border:5px solid #fff;margin-bottom:18px;}
  .choices{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .choice{background:#fff;border:4px solid #fff;border-radius:18px;padding:16px 26px;font-family:inherit;font-weight:900;
    font-size:clamp(20px,3.5vw,26px);color:var(--ink);cursor:pointer;box-shadow:0 5px 12px rgba(0,0,0,.12);transition:.12s;min-width:130px;}
  .choice:active{transform:scale(.96);}
  .choice.ok{background:#d9f7e6;border-color:var(--good);}
  .choice.no{background:#fde3df;border-color:var(--bad);}

  /* memory pairs */
  .board{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;max-width:560px;margin:0 auto;}
  .mcard{aspect-ratio:3/4;border-radius:16px;cursor:pointer;position:relative;transition:transform .1s;}
  .mcard .face{position:absolute;inset:0;border-radius:16px;display:flex;align-items:center;justify-content:center;
    backface-visibility:hidden;box-shadow:0 5px 12px rgba(0,0,0,.15);overflow:hidden;font-size:40px;}
  .mcard .b{background:linear-gradient(160deg,#8fc0f5,#5b9bf0);color:#fff;border:4px solid #fff;}
  .mcard .f{background:#fff;border:4px solid #fff;transform:rotateY(180deg);}
  .mcard .f img{width:88%;height:64%;object-fit:cover;border-radius:8px;}
  .mcard .f .nm{position:absolute;bottom:6px;font-size:13px;font-weight:900;color:var(--ink);}
  .mcard{transform-style:preserve-3d;transition:transform .35s;}
  .mcard.flip{transform:rotateY(180deg);}
  .mcard.done{opacity:.55;}

  /* sort */
  .sortItem{margin-bottom:16px;}
  .sortItem img{width:150px;border-radius:10px;box-shadow:0 5px 14px rgba(0,0,0,.22);border:4px solid #fff;}
  .sortItem .nm{font-size:24px;font-weight:900;margin-top:8px;}
  .bins{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;}
  .bin{min-width:130px;padding:18px 12px;border-radius:20px;font-weight:900;font-size:19px;color:#fff;cursor:pointer;
    box-shadow:0 6px 16px rgba(0,0,0,.15);border:4px solid rgba(255,255,255,.6);}
  .bin:active{transform:scale(.96);}

  .spark{position:fixed;pointer-events:none;font-size:26px;z-index:60;animation:fly 1s ease-out forwards;}
  @keyframes fly{0%{opacity:1;transform:translate(0,0) scale(.6)}100%{opacity:0;transform:translate(var(--dx),var(--dy)) scale(1.3)}}
  @media (prefers-reduced-motion: reduce){.mcard{transition:none;}*{animation:none!important;}}
</style>
</head>
<body>
<a class="home" href="./" title="בית">🏠</a>
<div id="app">
  <header>
    <button class="mute" id="mute">🔊</button>
    <h1 id="title">🧭 אַתְגְּרֵי הָעוֹלָם</h1>
    <span class="stars" id="stars">⭐ 0</span>
    <button class="back hidden" id="back">⟵ תפריט</button>
  </header>
  <main>
    <div class="menu view" id="menu">
      <div class="gcard" onclick="openGame('match')"><div class="i">🚩</div><div class="l">אֵיזוֹ מְדִינָה?</div><div class="d">הִסְתַּכְּלוּ עַל הַדֶּגֶל וּבַחֲרוּ אֶת הַשֵּׁם</div></div>
      <div class="gcard" onclick="openGame('pairs')"><div class="i">🧠</div><div class="l">זִכָּרוֹן זוּגוֹת</div><div class="d">מִצְאוּ אֶת זוּגוֹת הַדְּגָלִים הַזֵּהִים</div></div>
      <div class="gcard" onclick="openGame('sort')"><div class="i">🗺️</div><div class="l">לְאֵיזוֹ יַבֶּשֶׁת?</div><div class="d">מַיְּנוּ כָּל מְדִינָה לַיַּבֶּשֶׁת שֶׁלָּהּ</div></div>
    </div>
    <div class="view hidden" id="v-match"><div class="hint" id="h-match"></div><img class="bigflag" id="mflag" src="" alt=""><div class="choices" id="mchoices"></div></div>
    <div class="view hidden" id="v-pairs"><div class="hint" id="h-pairs"></div><div class="board" id="board"></div></div>
    <div class="view hidden" id="v-sort"><div class="hint" id="h-sort"></div><div class="sortItem" id="sortItem"></div><div class="bins" id="sbins"></div></div>
  </main>
</div>

<script>
const flag=c=>`https://flagcdn.com/w320/${c}.png`;
const C=[
 {n:"צָרְפַת",c:"fr",cont:"אֵירוֹפָּה"},{n:"אִיטַלְיָה",c:"it",cont:"אֵירוֹפָּה"},{n:"בְּרִיטַנְיָה",c:"gb",cont:"אֵירוֹפָּה"},
 {n:"יָפָן",c:"jp",cont:"אַסְיָה"},{n:"סִין",c:"cn",cont:"אַסְיָה"},{n:"הֹדּוּ",c:"in",cont:"אַסְיָה"},
 {n:"קֶנְיָה",c:"ke",cont:"אַפְרִיקָה"},{n:"מָרוֹקוֹ",c:"ma",cont:"אַפְרִיקָה"},{n:"מָדָגַסְקַר",c:"mg",cont:"אַפְרִיקָה"},
 {n:"בְּרָזִיל",c:"br",cont:"אֲמֵרִיקָה"},{n:"אַרְגֶנְטִינָה",c:"ar",cont:"אֲמֵרִיקָה"},{n:"קָנָדָה",c:"ca",cont:"אֲמֵרִיקָה"},
];
const CONTS=["אֵירוֹפָּה","אַסְיָה","אַפְרִיקָה","אֲמֵרִיקָה"];
const CONTBG={"אֵירוֹפָּה":"#4a8de0","אַסְיָה":"#e0584e","אַפְרִיקָה":"#f0a64a","אֲמֵרִיקָה":"#3fb87a"};

let stars=+(localStorage.getItem("chal_stars")||0),muted=localStorage.getItem("chal_mute")==="1";
const $=id=>document.getElementById(id);
function setStars(n){stars=n;localStorage.setItem("chal_stars",n);$("stars").textContent="⭐ "+n;}
setStars(stars);
const shuffle=a=>{for(let i=a.length-1;i>0;i--){const j=(Math.random()*(i+1))|0;[a[i],a[j]]=[a[j],a[i]];}return a;};
const rnd=a=>a[(Math.random()*a.length)|0];

let actx;const AC=()=>actx||(actx=new (window.AudioContext||window.webkitAudioContext)());
function tone(f,d=.25,type="sine",delay=0,vol=.2){if(muted)return;try{const c=AC(),o=c.createOscillator(),g=c.createGain();o.type=type;o.frequency.value=f;o.connect(g);g.connect(c.destination);const t=c.currentTime+delay;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(vol,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+d);o.start(t);o.stop(t+d+.03);}catch(e){}}
const win=()=>[523,659,784,1047].forEach((f,i)=>tone(f,.22,"triangle",i*.08,.2));
const oops=()=>{tone(320,.15,"sine",0,.14);tone(250,.18,"sine",.09,.12);};
function sparkle(x,y){const em=["✨","⭐","🌟","💫"];for(let i=0;i<9;i++){const s=document.createElement("div");s.className="spark";s.textContent=em[i%4];s.style.left=x+"px";s.style.top=y+"px";const a=Math.random()*6.28,d=60+Math.random()*70;s.style.setProperty("--dx",Math.cos(a)*d+"px");s.style.setProperty("--dy",Math.sin(a)*d+"px");document.body.appendChild(s);setTimeout(()=>s.remove(),1000);}}
function reward(x,y){setStars(stars+1);sparkle(x,y);win();}

function show(id){document.querySelectorAll(".view").forEach(v=>v.classList.add("hidden"));$(id).classList.remove("hidden");}
$("mute").onclick=function(){muted=!muted;localStorage.setItem("chal_mute",muted?"1":"0");this.textContent=muted?"🔇":"🔊";};
$("mute").textContent=muted?"🔇":"🔊";
$("back").onclick=()=>{$("back").classList.add("hidden");$("title").textContent="🧭 אַתְגְּרֵי הָעוֹלָם";show("menu");};
function openGame(g){try{AC().resume();}catch(e){}$("back").classList.remove("hidden");
  if(g==="match"){$("title").textContent="🚩 אֵיזוֹ מְדִינָה?";show("v-match");nextMatch();}
  if(g==="pairs"){$("title").textContent="🧠 זִכָּרוֹן זוּגוֹת";show("v-pairs");buildPairs();}
  if(g==="sort"){$("title").textContent="🗺️ לְאֵיזוֹ יַבֶּשֶׁת?";show("v-sort");buildSbins();nextSort();}}

/* ===== איזו מדינה? (התאמה) ===== */
let ansCode=null;
function nextMatch(){const ans=rnd(C);ansCode=ans.c;
  $("h-match").textContent="אֵיזוֹ מְדִינָה זֹאת?";
  $("mflag").src=flag(ans.c);
  const opts=shuffle([ans,...shuffle(C.filter(x=>x.c!==ans.c)).slice(0,2)]);
  const el=$("mchoices");el.innerHTML="";
  opts.forEach(o=>{const b=document.createElement("button");b.className="choice";b.textContent=o.n;
    b.onclick=()=>{if(o.c===ansCode){b.classList.add("ok");const r=b.getBoundingClientRect();reward(r.left+r.width/2,r.top);
        $("h-match").textContent="נָכוֹן! כָּל הַכָּבוֹד 🎉";ansCode=null;setTimeout(nextMatch,900);}
      else{b.classList.add("no");oops();$("h-match").textContent="כִּמְעַט… נַסּוּ שׁוּב 🙂";setTimeout(()=>b.classList.remove("no"),600);}};
    el.appendChild(b);});}

/* ===== זיכרון זוגות ===== */
let first=null,lock=false,matched=0;
function buildPairs(){matched=0;first=null;lock=false;$("h-pairs").textContent="מִצְאוּ אֶת הַזּוּגוֹת הַזֵּהִים";
  const pick=shuffle(C.slice()).slice(0,6);
  const cards=shuffle([...pick,...pick].map((x,i)=>({...x,uid:i})));
  const b=$("board");b.innerHTML="";
  cards.forEach(card=>{const d=document.createElement("div");d.className="mcard";
    d.innerHTML=`<div class="face b">🌍</div><div class="face f"><img src="${flag(card.c)}" alt=""><span class="nm">${card.n}</span></div>`;
    d.dataset.c=card.c;d.onclick=()=>flipCard(d);b.appendChild(d);});}
function flipCard(d){if(lock||d.classList.contains("flip")||d.classList.contains("done"))return;
  d.classList.add("flip");tone(600,.12,"sine");
  if(!first){first=d;return;}
  lock=true;
  if(first.dataset.c===d.dataset.c){setTimeout(()=>{first.classList.add("done");d.classList.add("done");
      const r=d.getBoundingClientRect();reward(r.left+r.width/2,r.top);matched++;first=null;lock=false;
      if(matched===6){$("h-pairs").textContent="מָצָאתֶם אֶת כָּל הַזּוּגוֹת! כָּל הַכָּבוֹד 🏆";win();setTimeout(buildPairs,1600);}},450);}
  else{oops();setTimeout(()=>{first.classList.remove("flip");d.classList.remove("flip");first=null;lock=false;},800);}}

/* ===== לאיזו יבשת? (מיון) ===== */
let sCur=null;
function buildSbins(){const b=$("sbins");b.innerHTML="";CONTS.forEach(ct=>{const d=document.createElement("div");d.className="bin";d.style.background=CONTBG[ct];d.textContent=ct;d.onclick=()=>dropSort(ct,d);b.appendChild(d);});}
function nextSort(){sCur=rnd(C);$("h-sort").textContent="לְאֵיזוֹ יַבֶּשֶׁת שַׁיֶּכֶת הַמְּדִינָה?";
  $("sortItem").innerHTML=`<img src="${flag(sCur.c)}" alt=""><div class="nm">${sCur.n}</div>`;}
function dropSort(ct,binEl){if(!sCur)return;const r=binEl.getBoundingClientRect();
  if(ct===sCur.cont){reward(r.left+r.width/2,r.top);$("h-sort").textContent="נָכוֹן! 🎉";sCur=null;setTimeout(nextSort,850);}
  else{oops();$("h-sort").textContent="לֹא מְדֻיָּק, נַסּוּ יַבֶּשֶׁת אַחֶרֶת 🙂";}}
</script>
</body>
</html>
